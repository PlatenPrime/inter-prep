<!--
  100 — Skip link
  @tags a11y, keyboard
  @difficulty easy

  Skip to main content — виден только при фокусе.
  На собесе: Первый focusable элемент; href="#main"; position absolute off-screen until focus.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 — Skip link (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>100 — Skip link</h1>
      <p class="demo-task">Skip to main content — виден только при фокусе.</p>
      <div class="demo-meta">
        <span class="demo-badge">a11y, keyboard</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <a href="#tw-main" class="absolute left-0 top-0 -translate-y-full focus:translate-y-0 z-[100] px-4 py-2 bg-slate-900 text-white text-sm rounded-br-md focus:outline focus:outline-3 focus:outline-blue-600 focus:outline-offset-2">Skip to main content</a>
      <header class="px-4 py-3 bg-slate-700 text-white rounded-lg text-sm mb-2">Site header</header>
      <main id="tw-main" class="p-4 bg-slate-100 rounded-lg text-sm focus:outline focus:outline-2 focus:outline-blue-600" tabindex="-1"><p class="m-0">Main content — Tab to skip link first.</p></main>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> sr-only focus:not-sr-only focus:absolute — skip link pattern</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
