<!--
  100 — Skip link
  @tags a11y, keyboard
  @difficulty easy

  Skip to main content — виден только при фокусе.
  На собесе: Первый focusable элемент; href="#main"; position absolute off-screen until focus.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 — Skip link (Pure CSS)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>100 — Skip link</h1>
      <p class="demo-task">Skip to main content — виден только при фокусе.</p>
      <div class="demo-meta">
        <span class="demo-badge">a11y, keyboard</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Pure CSS</span>
      </div>
    </header>
    <div class="demo-stage">
      <a href="#main-content" class="skip-link">Skip to main content</a>
      <header class="site-h">Site header</header>
      <main id="main-content" class="site-m" tabindex="-1"><p>Main content area — target of skip link.</p></main>
    </div>
    
    
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
