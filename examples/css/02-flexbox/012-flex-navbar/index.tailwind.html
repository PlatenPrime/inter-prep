<!--
  012 — Flex navbar
  @tags flex, nav
  @difficulty easy

  Navbar: logo слева, ссылки справа через space-between.
  На собесе: flex: 1 для центральной зоны; gap vs margin.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>012 — Flex navbar (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>012 — Flex navbar</h1>
      <p class="demo-task">Navbar: logo слева, ссылки справа через space-between.</p>
      <div class="demo-meta">
        <span class="demo-badge">flex, nav</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <nav class="flex justify-between items-center px-4 py-3 bg-slate-800 text-white rounded-lg"><span class="font-bold">Logo</span><ul class="flex gap-4 list-none m-0 p-0 text-sm"><li><a href="#" class="text-slate-400 hover:text-white">Home</a></li><li><a href="#" class="text-slate-400 hover:text-white">About</a></li><li><a href="#" class="text-slate-400 hover:text-white">Contact</a></li></ul></nav>

    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> justify-between items-center gap-4</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>

</html>
