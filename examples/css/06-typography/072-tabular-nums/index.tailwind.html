<!--
  072 — Tabular numbers
  @tags typography
  @difficulty easy

  font-variant-numeric: tabular-nums для таблиц.
  На собесе: Цифры одинаковой ширины в price tables.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>072 — Tabular numbers (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>072 — Tabular numbers</h1>
      <p class="demo-task">font-variant-numeric: tabular-nums для таблиц.</p>
      <div class="demo-meta">
        <span class="demo-badge">typography</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <table class="tabular-nums text-sm border-collapse"><tr><td class="p-1 border border-slate-200 text-right">9</td><td class="p-1 border border-slate-200 text-right">99</td></tr><tr><td class="p-1 border border-slate-200 text-right">1</td><td class="p-1 border border-slate-200 text-right">123</td></tr></table>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> tabular-nums</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
