  006 — rem vs em
  @tags fundamentals, units
  @difficulty easy

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>006 — rem vs em (Pure CSS)</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>006 — rem vs em</h1>
      <p class="demo-task">rem от root, em от родителя — размер шрифта вложенных элементов.</p>
      <div class="demo-meta">
        <span class="demo-badge">fundamentals, units</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Pure CSS</span>

    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
