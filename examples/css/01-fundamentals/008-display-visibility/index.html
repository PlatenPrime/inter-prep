  008 — display vs visibility
  @tags fundamentals, display

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>008 — display vs visibility</h1>
      <p class="demo-task">visibility:hidden сохраняет место; display:none убирает из потока.</p>
      <div class="demo-meta">

    <div class="demo-stage">

    </div>
    
    
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
