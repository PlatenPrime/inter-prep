<!--
  026 — Holy grail (grid)
  @tags grid, layout
  @difficulty medium

  Классический holy grail на CSS Grid areas.
  На собесе: grid-template-areas; fr units.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>026 — Holy grail (grid) (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>026 — Holy grail (grid)</h1>
      <p class="demo-task">Классический holy grail на CSS Grid areas.</p>
      <div class="demo-meta">
        <span class="demo-badge">grid, layout</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="grid min-h-[200px] text-xs gap-0.5" style="grid-template-columns:80px 1fr 80px;grid-template-rows:auto 1fr auto;grid-template-areas:'head head head' 'nav main aside' 'foot foot foot'"><header class="p-2 bg-slate-700 text-white" style="grid-area:head">Header</header><nav class="p-2 bg-slate-400" style="grid-area:nav">Nav</nav><main class="p-2 bg-slate-100" style="grid-area:main">Main</main><aside class="p-2 bg-slate-300" style="grid-area:aside">Aside</aside><footer class="p-2 bg-slate-700 text-white" style="grid-area:foot">Footer</footer></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> grid-template-areas — inline style или @apply grid-areas-*</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
