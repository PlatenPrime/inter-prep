<head>

  <div class="demo-page">
    <header class="demo-header">
      <h1>034 — minmax(0, 1fr)</h1>
      <p class="demo-task">Предотвращение overflow в fr-колонке.</p>
      <div class="demo-meta">
        <span class="demo-badge">grid, overflow</span>
