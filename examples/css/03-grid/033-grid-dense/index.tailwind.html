<!--
  033 — grid-auto-flow dense
  @tags grid
  @difficulty medium

  Заполнение дыр в masonry-like сетке.
  На собесе: dense может менять визуальный порядок.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>033 — grid-auto-flow dense (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>033 — grid-auto-flow dense</h1>
      <p class="demo-task">Заполнение дыр в masonry-like сетке.</p>
      <div class="demo-meta">
        <span class="demo-badge">grid</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="grid grid-cols-3 grid-flow-dense gap-1"><div class="row-span-2 p-4 bg-amber-300 rounded text-xs text-center">1</div><div class="p-4 bg-amber-300 rounded text-xs text-center">2</div><div class="p-4 bg-amber-300 rounded text-xs text-center">3</div><div class="col-span-2 p-4 bg-amber-300 rounded text-xs text-center">4</div><div class="p-4 bg-amber-300 rounded text-xs text-center">5</div></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> grid-flow-dense row-span-2 col-span-2</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
