<!--
  029 — Sidebar 250px 1fr
  @tags grid
  @difficulty easy

  Две колонки: 120px + 1fr.
  На собесе: fr делит оставшееся пространство.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>029 — Sidebar 250px 1fr (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>029 — Sidebar 250px 1fr</h1>
      <p class="demo-task">Две колонки: 120px + 1fr.</p>
      <div class="demo-meta">
        <span class="demo-badge">grid</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="grid grid-cols-[120px_1fr] gap-2 min-h-[100px] text-xs"><aside class="bg-slate-600 text-white p-3 rounded">Sidebar</aside><main class="bg-slate-200 p-3 rounded">Main 1fr</main></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> grid-cols-[120px_1fr]</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
