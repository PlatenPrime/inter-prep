<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>035 — Named grid lines (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />

  <script src="https://cdn.tailwindcss.com"></script>

<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>035 — Named grid lines</h1>
      <p class="demo-task">grid-column: content-start / content-end.</p>
      <div class="demo-meta">
        <span class="demo-badge">grid</span>
        <span class="demo-badge demo-badge--medium">medium</span>

      </div>

    <div class="demo-stage">
      <div class="grid min-h-[80px] bg-slate-100 p-1 gap-1" style="grid-template-columns:[edge-start] 1fr [content-start] 2fr [content-end] 1fr [edge-end]"><div class="bg-blue-400 text-white p-4 rounded text-xs text-center" style="grid-column: content-start / content-end">Named lines</div></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> named lines — CSS; arbitrary grid-column</p>
