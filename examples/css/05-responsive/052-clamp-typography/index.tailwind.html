<!--
  052 — clamp() typography
  @tags responsive, clamp
  @difficulty medium

  Плавный размер шрифта: clamp(min, preferred, max).
  На собесе: preferred часто vi/vw + rem.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>052 — clamp() typography (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>052 — clamp() typography</h1>
      <p class="demo-task">Плавный размер шрифта: clamp(min, preferred, max).</p>
      <div class="demo-meta">
        <span class="demo-badge">responsive, clamp</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <h2 class="m-0 text-[clamp(1.25rem,2vw+1rem,2rem)] leading-tight text-blue-800">Fluid heading</h2>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> text-[clamp(...)] arbitrary value</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
