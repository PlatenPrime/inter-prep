<!--
  063 — Fluid auto-fit grid
  @tags responsive, grid
  @difficulty medium

  Сетка карточек без breakpoints.
  На собесе: Тот же паттерн что 028 в grid секции.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>063 — Fluid auto-fit grid (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>063 — Fluid auto-fit grid</h1>
      <p class="demo-task">Сетка карточек без breakpoints.</p>
      <div class="demo-meta">
        <span class="demo-badge">responsive, grid</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="grid grid-cols-[repeat(auto-fill,minmax(min(100%,120px),1fr))] gap-2"><div class="p-4 bg-violet-300 rounded text-center text-sm">1</div><div class="p-4 bg-violet-300 rounded text-center text-sm">2</div><div class="p-4 bg-violet-300 rounded text-center text-sm">3</div></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> auto-fill minmax</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
