<!--
  089 — animation-fill-mode
  @tags animation
  @difficulty medium

  forwards сохраняет конечное состояние.
  На собесе: backwards, both, none.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>089 — animation-fill-mode (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>089 — animation-fill-mode</h1>
      <p class="demo-task">forwards сохраняет конечное состояние.</p>
      <div class="demo-meta">
        <span class="demo-badge">animation</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="w-20 px-3 py-3 bg-teal-500 text-white rounded text-xs text-center animate-[grow_1s_ease_forwards]">Filled</div><style>@keyframes grow{from{width:40px;opacity:.5}to{width:120px;opacity:1}}</style>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> forwards via animate-[..._forwards]</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
