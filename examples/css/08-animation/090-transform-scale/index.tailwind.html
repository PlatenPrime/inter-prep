<!--
  090 — Transform scale
  @tags animation, transform
  @difficulty easy

  scale на hover без layout shift.
  На собесе: transform не вызывает reflow.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>090 — Transform scale (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>090 — Transform scale</h1>
      <p class="demo-task">scale на hover без layout shift.</p>
      <div class="demo-meta">
        <span class="demo-badge">animation, transform</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="inline-block px-8 py-6 bg-amber-400 rounded-lg font-semibold text-sm cursor-pointer transition hover:scale-105">Scale me</div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> hover:scale-105 transition</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
