<!--
  088 — Slide-in animation
  @tags animation
  @difficulty medium

  Въезд панели через translateX keyframes.
  На собесе: animation-fill-mode: forwards.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>088 — Slide-in animation (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>088 — Slide-in animation</h1>
      <p class="demo-task">Въезд панели через translateX keyframes.</p>
      <div class="demo-meta">
        <span class="demo-badge">animation</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="px-6 py-4 bg-violet-500 text-white rounded-md text-sm animate-[slideIn_0.5s_ease_forwards]">Slide in</div><style>@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}</style>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> animate-[name_duration] or @keyframes in style</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
