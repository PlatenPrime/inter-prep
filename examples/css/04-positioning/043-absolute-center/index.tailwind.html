<!--
  043 — Absolute center
  @tags position
  @difficulty easy

  Центр через absolute + transform или inset.
  На собесе: top/left 50% + translate; или inset:0 + margin auto.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>043 — Absolute center (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>043 — Absolute center</h1>
      <p class="demo-task">Центр через absolute + transform или inset.</p>
      <div class="demo-meta">
        <span class="demo-badge">position</span>
        <span class="demo-badge demo-badge--easy">easy</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="relative min-h-[140px] bg-slate-200 rounded-lg"><div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-5 py-3 bg-orange-600 text-white rounded-md text-sm font-semibold">Centered</div></div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
