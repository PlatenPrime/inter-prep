<!--
  042 — Fixed modal overlay
  @tags position, modal
  @difficulty medium

  Модалка: fixed overlay + centered dialog.
  На собесе: inset: 0; flex center; z-index stacking.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>042 — Fixed modal overlay (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>042 — Fixed modal overlay</h1>
      <p class="demo-task">Модалка: fixed overlay + centered dialog.</p>
      <div class="demo-meta">
        <span class="demo-badge">position, modal</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div><button type="button" id="tw-open" class="px-4 py-2 bg-blue-600 text-white rounded-md border-0 cursor-pointer">Open modal</button><div id="tw-overlay" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 hidden"><div class="bg-white p-6 rounded-lg shadow-xl max-w-xs"><p class="text-sm m-0 mb-4">Modal content</p><button type="button" id="tw-close" class="px-3 py-1 border border-slate-200 rounded bg-slate-50 cursor-pointer">Close</button></div></div></div><script>const o=document.getElementById('tw-overlay');document.getElementById('tw-open')?.addEventListener('click',()=>o?.classList.remove('hidden'));document.getElementById('tw-close')?.addEventListener('click',()=>o?.classList.add('hidden'));</script>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> fixed inset-0 flex items-center justify-center</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
