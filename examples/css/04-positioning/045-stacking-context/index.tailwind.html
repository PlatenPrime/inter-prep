<!--
  045 — Stacking context
  @tags position, z-index
  @difficulty medium

  z-index:9999 внутри контекста не выходит наружу.
  На собесе: opacity, transform, filter создают новый context.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>045 — Stacking context (Tailwind CDN)</title>
  <link rel="stylesheet" href="../../_shared/reset.css" />
  <link rel="stylesheet" href="../../_shared/demo.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="demo-page">
    <header class="demo-header">
      <h1>045 — Stacking context</h1>
      <p class="demo-task">z-index:9999 внутри контекста не выходит наружу.</p>
      <div class="demo-meta">
        <span class="demo-badge">position, z-index</span>
        <span class="demo-badge demo-badge--medium">medium</span>
        <span class="demo-badge">Tailwind CDN</span>
      </div>
    </header>
    <div class="demo-stage">
      <div class="relative z-[1] bg-red-200 p-4 rounded"><div class="relative z-[1] bg-blue-200 p-4 mt-2 transform"><span class="relative z-[9999] bg-green-500 text-white px-2 py-1 text-xs">z-9999 trapped</span></div></div><div class="relative z-[2] bg-slate-800 text-white p-3 mt-2 rounded text-xs">Sibling z-2 on top</div>
    </div>
    
    <p class="demo-hint"><strong>CSS ↔ Tailwind:</strong> z-index только внутри stacking context</p>
    <nav class="demo-nav"><a href="../../index.html">← Все примеры</a></nav>
  </div>
</body>
</html>
